<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="50%" stop-color="#1a1033"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B2CBF"/>
      <stop offset="50%" stop-color="#C77DFF"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C77DFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E91E63" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1200" height="280" rx="16" fill="url(#bg)"/>
  <circle cx="200" cy="80" r="120" fill="url(#glow)" filter="url(#blur)"/>
  <circle cx="1000" cy="200" r="140" fill="url(#glow)" filter="url(#blur)"/>

  <rect x="40" y="40" width="1120" height="200" rx="12" stroke="url(#accent)" stroke-width="1.5" fill="none" opacity="0.4"/>

  <text x="600" y="110" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="52" font-weight="700" fill="url(#accent)">
    Mehak Naz Dharwad
  </text>
  <text x="600" y="155" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="22" fill="#C9D1D9" opacity="0.9">
    Full Stack Developer · AI Enthusiast · Game Builder
  </text>
  <text x="600" y="195" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#8B949E">
    she/her  ·  TypeScript  ·  Python  ·  Computer Vision  ·  she ships code
  </text>

  <circle cx="80" cy="140" r="4" fill="#C77DFF" opacity="0.8"/>
  <circle cx="1120" cy="140" r="4" fill="#E91E63" opacity="0.8"/>
  <line x1="100" y1="140" x2="300" y2="140" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <line x1="900" y1="140" x2="1100" y2="140" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
</svg>
